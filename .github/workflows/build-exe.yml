name: Build EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve build version
        id: version
        shell: pwsh
        run: |
          $refType = "${{ github.ref_type }}"
          $refName = "${{ github.ref_name }}"
          if ($refType -eq "tag" -and $refName -match "^v(?<version>[0-9]+(\.[0-9]+){2}([.-][0-9A-Za-z.-]+)?)$") {
            $version = $Matches["version"]
          } else {
            $match = Select-String -Path pyproject.toml -Pattern '^version = "(.+)"$'
            if (-not $match) {
              throw "Could not resolve project version from pyproject.toml."
            }
            $version = $match.Matches[0].Groups[1].Value
          }
          "value=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Build version: $version"

      - name: Sync version into source
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.value }}"

          $initPath = "src/client/__init__.py"
          $initContent = Get-Content -Raw -Path $initPath
          $initContent = [regex]::Replace(
            $initContent,
            '__version__\s*=\s*"[^"]*"',
            "__version__ = `"$version`""
          )
          Set-Content -Path $initPath -Value $initContent -Encoding utf8NoBOM

          $pyprojectPath = "pyproject.toml"
          $pyprojectContent = Get-Content -Raw -Path $pyprojectPath
          $versionPattern = [regex]'version\s*=\s*"[^"]*"'
          $pyprojectContent = $versionPattern.Replace($pyprojectContent, "version = `"$version`"", 1)
          Set-Content -Path $pyprojectPath -Value $pyprojectContent -Encoding utf8NoBOM

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[build]

      - name: Build EXE
        shell: pwsh
        run: ./build/build.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: eimzo-atb-client-windows
          path: dist/eimzo-atb-client.exe

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/eimzo-atb-client.exe
