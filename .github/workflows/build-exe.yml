name: Build EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[build]

      - name: Build EXE
        shell: pwsh
        run: ./build/build.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: eimzo-atb-client-windows
          path: dist/eimzo-atb-client.exe

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/eimzo-atb-client.exe
